<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Резюме - Георгий Воловиков</title>
        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body class="bg-light-subtle">
        <div class="container py-md-5">
            <div class="row justify-content-center">
                <div
                    class="col-12 col-xl-10 shadow-sm bg-white p-0 overflow-hidden rounded-4"
                >
                    <div class="row g-0">
                        <!-- Left Column -->
                        <div
                            class="col-md-4 col-lg-3 bg-body-tertiary border-end p-4"
                        >
                            <div class="text-center mb-4">
                                <div class="ratio ratio-1x1 mb-3">
                                    <img
                                        id="personal-photo"
                                        src=""
                                        alt="Георгий Воловиков"
                                        class="img-fluid rounded object-fit-cover"
                                    />
                                </div>
                            </div>

                            <div id="skills-section">
                                <h4 class="fw-bold mb-3 border-bottom pb-2">
                                    Навыки
                                </h4>
                                <div id="skills-container">
                                    <!-- Skills will be injected here -->
                                </div>
                            </div>
                        </div>

                        <!-- Right Column -->
                        <div class="col-md-8 col-lg-9 p-4 p-md-5">
                            <div
                                class="d-flex justify-content-between align-items-start mb-4"
                            >
                                <div>
                                    <h1
                                        id="personal-name"
                                        class="display-5 fw-bold mb-1"
                                    ></h1>
                                    <div
                                        id="personal-contacts"
                                        class="text-muted"
                                    >
                                        <!-- Contacts will be injected here -->
                                    </div>
                                </div>
                            </div>

                            <div class="mb-5">
                                <div
                                    class="alert alert-success border-0 shadow-sm p-4 rounded-4"
                                >
                                    <p
                                        id="personal-quote"
                                        class="fst-italic mb-0 small text-dark"
                                    ></p>
                                </div>
                            </div>

                            <!-- Objective -->
                            <div class="mb-5">
                                <div
                                    class="alert alert-primary border-0 shadow-sm p-4 rounded-4"
                                >
                                    <h4
                                        id="objective-title"
                                        class="fw-bold mb-3 text-uppercase small"
                                    ></h4>
                                    <p
                                        id="objective-text"
                                        class="lead fs-6 mb-0"
                                    ></p>
                                </div>
                            </div>

                            <!-- Education -->
                            <div class="mb-5">
                                <h3
                                    class="fw-bold border-bottom pb-2 mb-3 text-uppercase"
                                >
                                    Образование
                                </h3>
                                <div id="education-container">
                                    <!-- Education entries will be injected here -->
                                </div>
                            </div>

                            <!-- Projects -->
                            <div class="mb-5">
                                <h3
                                    class="fw-bold border-bottom pb-2 mb-4 text-uppercase"
                                >
                                    Pet-проекты
                                </h3>
                                <div id="projects-container">
                                    <!-- Projects will be injected here -->
                                </div>
                            </div>

                            <!-- Extracurricular -->
                            <div class="mb-5">
                                <h3
                                    class="fw-bold border-bottom pb-2 mb-4 text-uppercase"
                                >
                                    Внеучебная деятельность
                                </h3>
                                <div id="extracurricular-container">
                                    <!-- Extracurricular activities will be injected here -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bootstrap Bundle with Popper -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Custom Script -->
        <script src="script.js"></script>
    </body>
</html>
